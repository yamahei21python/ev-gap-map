name: 自動データスクレイピングとマップ更新

on:
  schedule:
    - cron: '0 18 * * *' # 毎日深夜3時(日本時間)に自動実行する場合（UTC表記で18時）
  workflow_dispatch: # 手動で「今すぐ実行」ボタンを押せるようにする設定

# GitHub Pagesへのデプロイに必要な権限設定
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: コードのチェックアウト
        uses: actions/checkout@v3
        
      - name: Pythonのセットアップ
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: 必要なライブラリのインストール
        run: |
          pip install -r requirements.txt
          
      - name: DBをSQLダンプから復元
        run: |
          mkdir -p data
          gunzip -c data/population.sql.gz | sqlite3 data/population.db
          gunzip -c data/ev_chargers.sql.gz | sqlite3 data/ev_chargers.db
          
      - name: Gogoevの新着EV充電器データの取得 (上位3ページの差分アップデート)
        run: python3 main.py update-stations --pages 3
          
      - name: 新規スタンドのジオコーディング(緯度経度化)
        run: python3 main.py geocode
        
      - name: 最新のGap分析マップデータ(GeoJSON)を生成
        run: python3 main.py gap-map
        
      - name: 更新されたデータをSQLダンプとして保存(コミット)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          # ev_chargers.db を SQLダンプに書き戻す
          sqlite3 data/ev_chargers.db .dump | gzip > data/ev_chargers.sql.gz
          git add data/ev_chargers.sql.gz
          git commit -m "自動更新: 新しい充電スタンドデータをSQLダンプに反映" || exit 0
          git push

      - name: GitHub Pages用に全ファイルをアップロード準備
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # ルートディレクトリをそのまま公開

  # GitHub Pagesへ実際に公開するジョブ
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update-data
    steps:
      - name: GitHub Pagesへデプロイ！
        id: deployment
        uses: actions/deploy-pages@v4
